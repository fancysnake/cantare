[tools]
aube = "1.16.1"
node = "25.9.0"

[hooks]
enter = "aube install"

[tasks.dev]
description = "Start the Astro dev server"
run = "aube run dev"

[tasks.build]
description = "Build the static site"
run = "aube run build"

[tasks.preview]
description = "Preview the built site"
run = "aube run preview"

[tasks.lint]
description = "ESLint + Prettier check"
run = ["aube run lint", "aube run format:check"]

[tasks.format]
description = "Format with Prettier"
run = "aube run format"

[tasks.check]
description = "Type-check templates with astro check"
run = "aube run check"

[tasks.sync]
description = "Generate Astro types (astro sync)"
run = "aube exec astro sync"

[env]
_.path = ['{{config_root}}/node_modules/.bin']
