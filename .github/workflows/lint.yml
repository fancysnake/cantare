name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: aube install

      - name: Generate Astro types
        run: mise run sync

      - name: ESLint + Prettier check
        run: mise run lint

      - name: Type-check with astro check
        run: mise run check
