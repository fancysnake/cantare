name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: aube install

      - name: ESLint + Prettier check
        run: mise run lint

      - name: Type-check with astro check
        run: mise run check
